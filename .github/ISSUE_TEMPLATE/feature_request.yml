name: Feature Request
description: Suggest a new feature or improvement for HIC Mouse
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas for making Mouse better. Please describe what you'd like and why it matters to your workflow.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What are you trying to do?
      placeholder: "I'm trying to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "It would be great if Mouse could..."
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this relate to?
      options:
        - File editing (quick_edit, batch_quick_edit)
        - File navigation (read_lines, find_in_file, jump_to_line_n)
        - New tool idea
        - Performance
        - Compatibility (new IDE or AI client)
        - Documentation
        - Licensing / billing
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds?
    validations:
      required: false

  - type: dropdown
    id: ai-assistant
    attributes:
      label: AI Assistant
      description: Which AI assistant are you using with HIC Mouse? (Helps us prioritize compatibility)
      options:
        - GitHub Copilot
        - Claude Code
        - Cursor
        - Other
        - N/A
    validations:
      required: false
