name: Bug Report
description: Report a bug or unexpected behavior in Mouse
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: mouse-version
    attributes:
      label: Mouse Version
      description: "Run `Mouse: Show Version` from the Command Palette, or check the Extensions panel."
      placeholder: "e.g., 0.10.10"
    validations:
      required: true

  - type: dropdown
    id: ide
    attributes:
      label: IDE / Client
      description: Which editor or AI client are you using Mouse with?
      options:
        - VS Code + GitHub Copilot
        - Cursor
        - Kiro
        - Claude Code (CLI)
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Windows 11, macOS 15.2, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect to happen, and what actually happened?
      placeholder: "When I tried to... I expected... but instead..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open a file...
        2. Run the tool...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: "Paste any relevant output from the Mouse output channel (View → Output → Mouse)."
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help — screenshots, file types involved, workspace size, etc.
    validations:
      required: false
